services:
  - type: web
    name: lucky14-backend
    runtime: native
    rootDir: Lucky14
    plan: free
    buildCommand: mvn -q -DskipTests package
    startCommand: java -jar target/Lucky14-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/v1/branches/getAllBranches
    envVars:
      - key: PORT
        value: 10000
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
